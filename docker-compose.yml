name: Deploy OnlineGoLogistics

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to VPS
        uses: appleboy/ssh-action@master
        env:
          GH_REPO: ${{ secrets.GH_REPO }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GH_REPO
          script: |
            set -e

            PROJECT_DIR=/var/www/onlinegologistics/onlinegologistics

            if [ ! -d "$PROJECT_DIR/.git" ]; then
              rm -rf $PROJECT_DIR
              git clone https://github.com/${GH_REPO}.git $PROJECT_DIR
            else
              cd $PROJECT_DIR
              git pull origin main
            fi

            cd $PROJECT_DIR

            cd frontend
            npm install
            npm run build
            cd ..

            docker compose down || true
            docker compose up -d --build

            echo "Deployment complete!"