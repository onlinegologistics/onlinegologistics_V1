name: Deploy OnlineGoLogistics

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build & Deploy
        run: |
          set -e
          PROJECT_DIR=/var/www/onlinegologistics/onlinegologistics
          if [ ! -d "$PROJECT_DIR/.git" ]; then
            rm -rf $PROJECT_DIR
            git clone https://github.com/onlinegologistics/onlinegologistics_V1.git $PROJECT_DIR
          else
            cd $PROJECT_DIR
            git fetch origin main
            git reset --hard origin/main
          fi
          cd $PROJECT_DIR
          cd frontend
          npm install
          npm run build
          cd ..
          docker compose down || true
          sudo fuser -k 5001/tcp || true
          docker compose up -d --build
          echo "Deployment complete!"